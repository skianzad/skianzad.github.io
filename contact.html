<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Contact Soheil Kianzad – Collaboration, talks, and conversation">
  <title>Contact – Soheil Kianzad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --surface:#ffffff; --surface2:#f3f4f6; --border:rgba(15,23,42,0.08);
      --accent:#b91c1c; --accent2:#111827; --text:#111827; --muted:#6b7280;
      --radius:12px; --transition:0.2s ease;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; padding-top: 64px; }
    a { color: inherit; text-decoration: none; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 0 1.5rem; height: 64px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border);
    }
    .nav-inner { width: 100%; max-width: 1040px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 1rem; letter-spacing: 0.02em; color: var(--text); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.875rem; color: var(--muted); transition: color var(--transition); }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 500; }
    .nav-toggle {
      display: none;
      align-items: center; justify-content: center;
      width: 44px; height: 44px; padding: 0;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; font-weight: 600; color: var(--text);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .nav-toggle:hover { background: var(--surface2); }
    .nav-toggle::before { content: 'Menu'; }
    .section-inner { max-width: 1040px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    .contact-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3.5rem; text-align: center; position: relative; overflow: hidden;
    }
    .contact-box::before {
      content: ''; position: absolute; bottom: -30%; right: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(185,28,28,0.06) 0%, transparent 70%); pointer-events: none;
    }
    .contact-box h2 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; letter-spacing: -0.03em; margin-bottom: 1rem; }
    .contact-box p { color: var(--muted); max-width: 500px; margin: 0 auto 2.5rem; line-height: 1.8; }
    .contact-links { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border-radius: 50px;
      font-size: 0.9rem; font-weight: 500; transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .btn-primary { background: var(--accent2); color: #fff; border: 1px solid var(--accent2); }
    .btn-primary:hover { background: #1f2937; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent2); background: var(--surface2); }
    footer {
      padding: 2rem clamp(1.5rem, 5vw, 4rem); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    footer p { font-size: 0.8rem; color: var(--muted); }
    .footer-icons { display: flex; gap: 0.75rem; }
    .footer-icons a {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 50%; color: var(--muted); font-size: 0.85rem;
      transition: color var(--transition), border-color var(--transition);
    }
    .footer-icons a:hover { color: var(--text); }
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .nav-inner { flex-wrap: wrap; }
      .nav-links { order: 3; flex-basis: 100%; }
      nav.nav--open .nav-links { display: flex; flex-direction: column; gap: 0; align-items: stretch; text-align: left; padding: 1rem 0 0.5rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
      nav.nav--open .nav-links li { width: 100%; }
      nav.nav--open .nav-links a { display: block; padding: 14px 0; font-size: 0.9375rem; border-bottom: 1px solid var(--border); }
      nav.nav--open .nav-links a:last-child { border-bottom: 0; }
      .nav-toggle { display: flex; order: 2; }
      .nav-brand { order: 1; }
      nav.nav--open .nav-toggle::before { content: 'Close'; }
    }
    @media (max-width: 600px) { .contact-box { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>
  <nav id="main-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">Soheil&nbsp;Kianzad</a>
      <button type="button" class="nav-toggle" aria-label="Toggle menu" onclick="document.getElementById('main-nav').classList.toggle('nav--open')"></button>
      <ul class="nav-links">
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="section-inner">
      <div class="contact-box">
        <h2>Connect.</h2>
        <p>For collaboration, talks, or a conversation — reach out.</p>
        <div class="contact-links">
          <a class="btn btn-primary" href="mailto:soheil@senscilab.com"><i class="fa-regular fa-envelope"></i> Email</a>
          <a class="btn btn-outline" href="https://github.com/skianzad" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a>
          <a class="btn btn-outline" href="https://www.linkedin.com/in/soheil-kianzad-phd-9aa51685/" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin-in"></i> LinkedIn</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Soheil Kianzad. Built with care.</p>
    <div class="footer-icons">
      <a href="https://github.com/skianzad" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.linkedin.com/in/soheil-kianzad-phd-9aa51685/" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
  </footer>
</body>
</html>
